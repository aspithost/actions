name: Vitest Coverage Report
description: A GitHub Action to upload a Vitest coverage report as a comment on a pull request

inputs:
  working-directory:
    description: The path to the package directory
    required: false
    default: '.'
  artifact-name:
    description: Name of the build artifact to download
    required: false
    default: vitest-coverage-report
  artifact-path:
    description: Path of the build artifact to download
    required: false
    default: coverage

runs:
  using: composite
  steps:
    - name: Download Vitest Coverage Results
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}

    - name: Vitest coverage report
      uses: davelosert/vitest-coverage-report-action@v2
