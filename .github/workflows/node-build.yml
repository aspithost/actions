name: Build Node

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        required: false
        type: string
        default: '24'
      package-manager:
        description: Package manager to use (npm, pnpm, yarn, or bun)
        required: false
        type: string
        default: npm
      build-command:
        description: Command to run for building, one per line (skipped if empty)
        required: false
        type: string
        default: npm run build
      lint-command:
        description: Command to run for linting, one per line (skipped if empty)
        required: false
        type: string
        default: npm run lint
      test-command:
        description: Command to run tests, one per line (skipped if empty)
        required: false
        type: string
        default: ''
      audit-command:
        description: Command to run for auditing dependencies, one per line (skipped if empty). Defaults to NPM audit
        required: false
        type: string
        default: npm audit --audit-level=critical
      upload-build:
        description: Upload the dist folder as an artifact
        required: false
        type: boolean
        default: false
      build-artifact-name:
        description: Name of the uploaded artifact
        required: false
        type: string
        default: dist
      build-artifact-path:
        description: Path to upload as artifact
        required: false
        type: string
        default: dist/
      build-artifact-retention-days:
        description: Number of days to retain the artifact
        required: false
        type: number
        default: 1
      upload-vitest-coverage-report:
        description: Upload a Vitest coverage report
        required: false
        type: boolean
        default: false
      vitest-coverage-report-artifact-name:
        description: Name of the uploaded artifact
        required: false
        type: string
        default: dist
      vitest-coverage-report-artifact-path:
        description: Path to upload as artifact
        required: false
        type: string
        default: dist/
      vitest-coverage-report-artifact-retention-days:
        description: Number of days to retain the artifact
        required: false
        type: number
        default: 1

jobs:
  build-node:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Bun
        if: inputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        if: inputs.package-manager != 'bun'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: ${{ inputs.package-manager }} ${{ inputs.package-manager == 'npm' && 'ci' || 'install --frozen-lockfile' }}

      - name: Build
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Lint
        if: inputs.lint-command != ''
        run: ${{ inputs.lint-command }}

      - name: Test
        if: inputs.test-command != ''
        run: ${{ inputs.test-command }}

      - name: Audit dependencies
        if: inputs.audit-command != ''
        run: ${{ inputs.audit-command }}

      - name: Upload build
        if: inputs.upload-build
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.build-artifact-name }}
          path: ${{ inputs.build-artifact-path }}
          retention-days: ${{ inputs.build-artifact-retention-days }}
          if-no-files-found: error

      - name: Upload Vitest coverage report
        if: inputs.upload-vitest-coverage-report
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.vitest-coverage-report-artifact-name }}
          path: ${{ inputs.vitest-coverage-report-artifact-path }}
          retention-days: ${{ inputs.vitest-coverage-report-artifact-retention-days }}
          if-no-files-found: error
