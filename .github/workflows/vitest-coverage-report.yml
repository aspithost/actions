name: Vitest Coverage Report

on:
  workflow_call:
    inputs:
      package-path:
        description: The path to the package directory
        required: false
        type: string
        default: '.'
      artifact-name:
        description: Name of the build artifact to download
        required: false
        type: string
        default: vitest-coverage-report
      artifact-path:
        description: Path of the build artifact to download
        required: false
        type: string
        default: coverage

jobs:
  vitest-coverage-report:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Download Vitest Coverage Results
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.package-path }}/${{ inputs.artifact-path }}

      - name: Vitest coverage report
        uses: davelosert/vitest-coverage-report-action@v2
